name: Deploy

on:
  repository_dispatch:
    types:
      - deploy

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/ubuntu/neswear-deploy
            git pull
            docker compose pull
            docker compose up -d 
            docker compose exec -T backend npm run seed
